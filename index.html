<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InNeed — World Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --navy:#2A2E9E;
    --blue:#3D74C9;
    --teal:#2FC7A3;
    --teal-light:#5FEFD1;
    --bg:#040509;
    --fg:#F2F5FF;
    --dim:#7C89B8;
    --dim-2:#4B5580;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family:'Space Grotesk', sans-serif;
    cursor:default;
  }

  body.idle{ cursor:none; }

  .vignette{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 45% at 50% 8%, rgba(61,116,201,0.16), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(42,46,158,0.10), transparent 70%);
    pointer-events:none;
  }

  .shift-wrap{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: transform 6s ease-in-out;
    will-change: transform;
  }

  .stage{
    width:100%; height:100%;
    max-width:1900px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:3vh 4vw;
  }

  header.brand{
    display:flex; flex-direction:column; align-items:center;
    gap:0.6vh;
    margin-bottom:3.4vh;
    animation: breathe 7s ease-in-out infinite;
  }

  header.brand img{
    height:clamp(34px, 5.4vh, 68px);
    width:auto;
    filter: drop-shadow(0 0 18px rgba(61,116,201,0.35));
  }

  @keyframes breathe{
    0%,100%{ opacity:0.92; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.015); }
  }

  .clocks{
    width:100%;
    display:flex;
    align-items:stretch;
    justify-content:center;
    position:relative;
    gap:0;
  }

  .divider{
    width:1px;
    align-self:stretch;
    margin: 0.5vh 4vw;
    background: linear-gradient(180deg,
      transparent 0%,
      var(--navy) 12%,
      var(--blue) 45%,
      var(--teal) 78%,
      transparent 100%);
    background-size: 100% 300%;
    animation: flow 9s linear infinite;
    opacity:0.55;
  }

  @keyframes flow{
    0%{ background-position: 0 0%; }
    100%{ background-position: 0 100%; }
  }

  .city{
    flex:1;
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
    min-width: 0;
  }

  .city .eyebrow{
    font-size:clamp(0.75rem, 1.1vw, 1rem);
    letter-spacing:0.32em;
    text-transform:uppercase;
    font-weight:600;
    margin-bottom:1.6vh;
  }

  .city.left .eyebrow{ color:var(--teal-light); }
  .city.right .eyebrow{ color:var(--blue); }

  .time-row{
    display:flex; align-items:baseline; gap:0.5vw;
    font-family:'IBM Plex Mono', monospace;
    font-variant-numeric: tabular-nums;
    line-height:1;
  }

  .time-main{
    font-size:clamp(3.4rem, 9.2vw, 8.4rem);
    font-weight:500;
    color:var(--fg);
    text-shadow: 0 0 30px rgba(61,116,201,0.25);
  }

  .time-ampm{
    font-size:clamp(1rem, 1.7vw, 1.7rem);
    font-weight:500;
    color:var(--dim);
    letter-spacing:0.05em;
  }

  .date-row{
    margin-top:1.6vh;
    font-size:clamp(0.95rem, 1.5vw, 1.35rem);
    font-weight:400;
    color:var(--dim);
    letter-spacing:0.02em;
  }

  .weather{
    margin-top:3.4vh;
    display:flex; align-items:center; gap:1vw;
    padding: 1.1vh 1.6vw;
    border-radius:999px;
    border:1px solid rgba(124,137,184,0.18);
    background: rgba(124,137,184,0.05);
  }

  .weather svg{
    width:clamp(26px, 2.6vw, 40px);
    height:clamp(26px, 2.6vw, 40px);
    flex-shrink:0;
  }

  .city.left .weather svg{ color:var(--teal); }
  .city.right .weather svg{ color:var(--blue); }

  .weather-text{
    display:flex; flex-direction:column; align-items:flex-start;
    line-height:1.25;
  }

  .weather-temp{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(1.1rem, 1.9vw, 1.7rem);
    font-weight:500;
    color:var(--fg);
  }

  .weather-desc{
    font-size:clamp(0.72rem, 1vw, 0.95rem);
    color:var(--dim);
    letter-spacing:0.01em;
  }

  .fullscreen-btn{
    position:fixed; top:3vh; right:3vh;
    width:46px; height:46px;
    border-radius:50%;
    border:1px solid rgba(124,137,184,0.25);
    background:rgba(4,5,9,0.6);
    display:flex; align-items:center; justify-content:center;
    color:var(--dim);
    cursor:pointer;
    transition: opacity 0.5s ease, transform 0.2s ease;
    z-index:10;
  }
  .fullscreen-btn:hover{ color:var(--fg); border-color:var(--teal); transform:scale(1.06); }
  .fullscreen-btn svg{ width:20px; height:20px; }

  body.idle .fullscreen-btn{ opacity:0; pointer-events:none; }

  @media (max-width: 900px){
    .clocks{ flex-direction:column; }
    .divider{ width:60%; height:1px; margin:3.2vh auto; align-self:center;
      background: linear-gradient(90deg, transparent 0%, var(--navy) 12%, var(--blue) 45%, var(--teal) 78%, transparent 100%);
      background-size:300% 100%;
      animation: flowX 9s linear infinite;
    }
    @keyframes flowX{ 0%{ background-position:0% 0; } 100%{ background-position:100% 0; } }
    .city{ padding: 1.2vh 0; }
  }

  @media (prefers-reduced-motion: reduce){
    header.brand, .divider{ animation:none; }
    .shift-wrap{ transition:none; }
  }
</style>
</head>

    sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/></svg>`,
    partly: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="9" r="3.4"/><path d="M8.5 3.5v1.6M3.7 6.2l1.2 1.2M13.3 6.2l-1.2 1.2"/><path d="M8 20h9.5a3.5 3.5 0 0 0 .4-6.98A5 5 0 0 0 8.3 14"/></svg>`,
    cloud: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 19h11a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.2 12.5 3.8 3.8 0 0 0 6.5 19Z"/></svg>`,
    fog: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h9a4 4 0 1 0-.6-7.96"/><path d="M3 13h18M3 17h18M3 21h12"/></svg>`,
    drizzle: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 13h11a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.2 6.5 3.8 3.8 0 0 0 6.5 13Z"/><path d="M9 17.5 8 20M13 17.5l-1 2.5M17 17.5l-1 2.5"/></svg>`,
    rain: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 12h11a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.2 5.5 3.8 3.8 0 0 0 6.5 12Z"/><path d="M8 16l-1.5 4M12.5 16 11 20M17 16l-1.5 4"/></svg>`,
    storm: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 11h11a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.2 4.5 3.8 3.8 0 0 0 6.5 11Z"/><path d="M13 13.5 10 18h3.4L11 22"/></svg>`,
    snow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 12h11a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.2 5.5 3.8 3.8 0 0 0 6.5 12Z"/><path d="M9 16v5M7 18.5h4M14 16v5M12 18.5h4"/></svg>`
  };

  function weatherFromCode(code){
    if(code === 0) return {icon:'sun', desc:'Clear sky'};
    if(code === 1) return {icon:'partly', desc:'Mostly clear'};
    if(code === 2) return {icon:'partly', desc:'Partly cloudy'};
    if(code === 3) return {icon:'cloud', desc:'Overcast'};
    if(code === 45 || code === 48) return {icon:'fog', desc:'Fog'};
    if([51,53,55,56,57].includes(code)) return {icon:'drizzle', desc:'Drizzle'};
    if([61,63,65,66,67,80,81,82].includes(code)) return {icon:'rain', desc:'Rain'};
    if([71,73,75,77,85,86].includes(code)) return {icon:'snow', desc:'Snow'};
    if([95,96,99].includes(code)) return {icon:'storm', desc:'Thunderstorm'};
    return {icon:'cloud', desc:'—'};
  }

  // ---------- Clock ----------
  const ZONES = {
    Dhaka:   { tz:'Asia/Dhaka' },
    Atlanta: { tz:'America/New_York' }
  };

  function updateClocks(){
    const now = new Date();
    for(const [name, cfg] of Object.entries(ZONES)){
      const timeStr = now.toLocaleTimeString('en-US', { timeZone: cfg.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
      const [main, ampm] = timeStr.split(' ');
      const dateStr = now.toLocaleDateString('en-US', { timeZone: cfg.tz, weekday:'long', month:'long', day:'numeric' });
      document.getElementById('time'+name).textContent = main;
      document.getElementById('ampm'+name).textContent = ampm || '';
      document.getElementById('date'+name).textContent = dateStr;
    }
  }
  updateClocks();
  setInterval(updateClocks, 1000);

  // ---------- Weather (live, refreshed every minute) ----------
  const PLACES = {
    Dhaka:   { lat:23.8103, lon:90.4125, tempUnit:'celsius',    windUnit:'kmh', tempSuffix:'°C' },
    Atlanta: { lat:33.7490, lon:-84.3880, tempUnit:'fahrenheit', windUnit:'mph', tempSuffix:'°F' }
  };

  async function fetchWeather(name){
    const p = PLACES[name];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code&temperature_unit=${p.tempUnit}&wind_speed_unit=${p.windUnit}&timezone=auto`;
    try{
      const res = await fetch(url);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const cur = data.current;
      const w = weatherFromCode(cur.weather_code);
      const iconHost = document.querySelector('#weather'+name+' svg');
      if(iconHost){
        const wrap = document.createElement('div');
        wrap.innerHTML = ICONS[w.icon];
        iconHost.replaceWith(wrap.firstElementChild);
      }
      document.getElementById('temp'+name).textContent = `${Math.round(cur.temperature_2m)}${p.tempSuffix}`;
      document.getElementById('desc'+name).textContent = `${w.desc} · Feels ${Math.round(cur.apparent_temperature)}° · ${Math.round(cur.relative_humidity_2m)}% humidity`;
    }catch(e){
      console.error('Weather fetch failed for ' + name + ':', e);
      document.getElementById('desc'+name).textContent = 'Weather unavailable';
    }
  }

  function refreshWeather(){
    fetchWeather('Dhaka');
    fetchWeather('Atlanta');
  }
  refreshWeather();
  setInterval(refreshWeather, 60 * 1000);

  // ---------- Idle / cursor-hide for screensaver use ----------
  let idleTimer;
  function resetIdle(){
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(()=> document.body.classList.add('idle'), 4000);
  }
  ['mousemove','touchstart','click','keydown'].forEach(evt => document.addEventListener(evt, resetIdle));
  resetIdle();

  // ---------- Fullscreen toggle ----------
  const fsBtn = document.getElementById('fsBtn');
  fsBtn.addEventListener('click', () => {
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    }else{
      document.exitFullscreen();
    }
  });

  // ---------- Gentle periodic shift to reduce OLED/LED burn-in ----------
  const shiftWrap = document.getElementById('shiftWrap');
  function gentleShift(){
    const x = (Math.random() * 16 - 8).toFixed(1);
    const y = (Math.random() * 12 - 6).toFixed(1);
    shiftWrap.style.transform = `translate(${x}px, ${y}px)`;
  }
  setInterval(gentleShift, 5 * 60 * 1000);
</script>
</body>
</html>
